<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(-45deg, #0f0f12, #1b0a2e, #0a102e); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #8b5cf6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // PASTE YOUR EXACT FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCgjjPJeB-Kh9YPI3fe12CtfFYb_i9swtE",
            authDomain: "elite-qr.firebaseapp.com",
            projectId: "elite-qr",
            storageBucket: "elite-qr.firebasestorage.app",
            messagingSenderId: "1054075970480",
            appId: "1:1054075970480:web:acf61f08b7b6fc7c292c75"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadHub() {
            const urlParams = new URLSearchParams(window.location.search);
            const qrId = urlParams.get('id');

            if (qrId && qrId !== 'preview') {
                try {
                    const docSnap = await getDoc(doc(db, "qr_history", qrId));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // Scarcity Check (Self-Destruct)
                        if (data.maxScans && data.scans >= data.maxScans) return document.body.innerHTML = "<h2>This Hub has reached its scan limit.</h2>";
                        if (data.expiryDate && new Date() > new Date(data.expiryDate)) return document.body.innerHTML = "<h2>This Hub has expired.</h2>";

                        // Track the scan
                        await updateDoc(doc(db, "qr_history", qrId), { scans: increment(1) });

                        // Build the UI
                        const hub = data.hubData;
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('hub-content').classList.remove('hidden');
                        document.getElementById('hub-name').innerText = hub.name;
                        document.getElementById('hub-bio').innerText = hub.bio;
                        
                        const linksContainer = document.getElementById('hub-links');
                        hub.links.forEach(link => {
                            if(link.title && link.url) {
                                linksContainer.innerHTML += `<a href="${link.url}" target="_blank" class="block w-full bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl p-4 mb-3 text-center font-bold transition-all transform hover:scale-[1.02] shadow-lg">${link.title}</a>`;
                            }
                        });
                    }
                } catch(e) { document.body.innerHTML = "<h2>Error loading Hub.</h2>"; }
            } else if (qrId === 'preview') {
                document.body.innerHTML = "<h2>Preview Mode. Generate to view live Hub.</h2>";
            }
        }
        loadHub();
    </script>
</head>
<body>
    <div id="loading" class="flex flex-col items-center"><div class="spinner mb-4"></div><p>Loading Profile...</p></div>
    
    <div id="hub-content" class="glass w-full max-w-md p-8 rounded-[32px] hidden text-center">
        <div class="w-20 h-20 mx-auto bg-gradient-to-tr from-purple-500 to-blue-500 rounded-full mb-4 shadow-xl flex items-center justify-center text-3xl">✨</div>
        <h1 id="hub-name" class="text-2xl font-bold mb-2">Name</h1>
        <p id="hub-bio" class="text-sm text-gray-400 mb-8">Bio goes here</p>
        <div id="hub-links" class="w-full"></div>
    </div>
</body>
</html>
