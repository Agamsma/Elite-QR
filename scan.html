<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing...</title>
    <style>
        body { background: #0f0f12; color: #8b5cf6; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #8b5cf6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgjjPJeB-Kh9YPI3fe12CtfFYb_i9swtE",
            authDomain: "elite-qr.firebaseapp.com",
            projectId: "elite-qr",
            storageBucket: "elite-qr.firebasestorage.app",
            messagingSenderId: "1054075970480",
            appId: "1:1054075970480:web:acf61f08b7b6fc7c292c75"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const getDeviceType = () => {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return "Tablet";
            if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) return "Mobile";
            return "Desktop";
        };

        async function routeUser() {
            const urlParams = new URLSearchParams(window.location.search);
            const qrId = urlParams.get('id');

            if (qrId && qrId !== 'preview') {
                const qrRef = doc(db, "qr_history", qrId);
                try {
                    const docSnap = await getDoc(qrRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();

                        // THE SCARCITY ENGINE: Expiry Checks
                        if (data.maxScans && data.scans >= data.maxScans) {
                            return document.body.innerHTML = "<h3 style='color: #ef4444;'>This QR Code has reached its scan limit and self-destructed.</h3>";
                        }
                        if (data.expiryDate && new Date() > new Date(data.expiryDate)) {
                            return document.body.innerHTML = "<h3 style='color: #ef4444;'>This QR Code has expired.</h3>";
                        }

                        let locationStr = "Unknown Location";
                        try {
                            const ipRes = await fetch('https://ipapi.co/json/');
                            const ipData = await ipRes.json();
                            if(ipData.city && ipData.region) locationStr = `${ipData.city}, ${ipData.region}`;
                        } catch(err) {}

                        await updateDoc(qrRef, { 
                            scans: increment(1),
                            scanLogs: arrayUnion({ timestamp: new Date().toISOString(), device: getDeviceType(), location: locationStr })
                        });

                        window.location.replace(data.originalUrl);
                    } else {
                        document.body.innerHTML = "<h3>QR Link Not Found.</h3>";
                    }
                } catch(e) { document.body.innerHTML = "<h3>Security Error.</h3>"; }
            } else if (qrId === 'preview') {
                document.body.innerHTML = "<h3>Preview mode.</h3>";
            }
        }
        routeUser();
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h2>Securing connection...</h2>
</body>
</html>
